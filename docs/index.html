<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Foundry SDK Academy — an interactive A–Z curriculum for mastering the Microsoft / Azure AI Foundry SDK, MCP connectors (ICM, Kusto, ADO), and managed-identity auth." />
  <meta name="color-scheme" content="dark light" />
  <title>Foundry SDK Academy</title>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <!-- Syntax highlighting (pinned, free CDN) -->
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="topbar">
    <button id="navToggle" class="icon-btn" aria-label="Toggle navigation" aria-expanded="false">☰</button>
    <a class="brand" href="#/" aria-label="Foundry SDK Academy home">
      <span class="brand-mark" aria-hidden="true">🎓</span>
      <span class="brand-text">Foundry&nbsp;SDK&nbsp;<strong>Academy</strong></span>
    </a>

    <div class="search-wrap" role="search">
      <span class="search-icon" aria-hidden="true">🔎</span>
      <input id="searchInput" type="search" placeholder="Search concepts, terms, code…  ( / )" aria-label="Search the curriculum" autocomplete="off" />
      <kbd class="search-kbd">/</kbd>
    </div>

    <div class="topbar-actions">
      <div class="progress-pill" id="globalProgress" title="Overall concepts marked learned">
        <svg viewBox="0 0 36 36" class="ring" aria-hidden="true">
          <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="ring-fg" id="ringFg" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
        </svg>
        <span id="progressLabel" class="progress-label">0%</span>
      </div>
      <button id="themeToggle" class="icon-btn" aria-label="Toggle light or dark theme">🌙</button>
    </div>
  </header>

  <div class="layout">
    <nav id="sidebar" class="sidebar" aria-label="Curriculum navigation">
      <div class="sidebar-inner" id="sidebarInner"><!-- built by JS --></div>
    </nav>
    <div id="scrim" class="scrim" hidden></div>

    <main id="main" class="content" tabindex="-1">
      <div id="view" class="view"><!-- routed views render here --></div>
      <footer class="site-footer">
        <p>Built as a static site · deploy free on GitHub Pages · authenticate everything with <strong>Managed Identity</strong>, never keys.</p>
        <p class="muted" id="buildStamp"></p>
      </footer>
    </main>
  </div>

  <!-- Data (generated + synthesized). Loaded before app logic. -->
  <script src="data/curriculum.js"></script>
  <script src="data/extras.js"></script>
  <!-- App logic -->
  <script src="js/util.js"></script>
  <script src="js/app.js"></script>
  <script src="js/views.js"></script>
  <!-- Syntax highlighter (pinned). Re-highlight once it finishes loading. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js" onload="window.dispatchEvent(new Event('hljs-ready'))"></script>
  <!-- Mermaid as ESM module; exposed on window for the app to call. -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'neutral' : 'dark';
    mermaid.initialize({ startOnLoad: false, theme, securityLevel: 'strict', fontFamily: 'inherit' });
    window.__mermaid = mermaid;
    window.dispatchEvent(new Event('mermaid-ready'));
  </script>
</body>
</html>
